version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
