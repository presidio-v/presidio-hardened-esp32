name: ESP-IDF Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [esp32, esp32s2, esp32s3, esp32c3]
        idf_version: ["v5.1.4", "v5.2.2"]

    container:
      image: espressif/idf:${{ matrix.idf_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build test app
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd test_app
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.idf_version }}
          path: test_app/build/*.bin
          retention-days: 7
